services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: kyonelife-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: kyonelife
      MINIO_ROOT_PASSWORD: kyonelife123456
    volumes:
      - ./docker-data/minio:/data
    restart: unless-stopped
