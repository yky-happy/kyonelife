<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Kyonelife — 记录技术、生活与思考" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css"
    />
    <title>Kyonelife · 守护一朵玫瑰，也记录每一次远行</title>
    <script>
      // 在首屏渲染前同步应用主题，避免深色模式闪白
      ;(function () {
        try {
          var saved = localStorage.getItem('kyonelife_theme')
          var theme = saved || 'light'
          document.documentElement.setAttribute('data-theme', theme)
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', theme === 'dark' ? '#0d0d0d' : '#ffffff')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
