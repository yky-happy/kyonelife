server:
  port: 8080

spring:
  application:
    name: blog
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB
  datasource:
    url: jdbc:mysql://localhost:3306/kyonelife?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ***REMOVED***
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.yky.blog

knife4j:
  enable: true

minio:
  endpoint: http://localhost:9000
  public-endpoint: http://localhost:9000
  access-key: kyonelife
  secret-key: kyonelife123456
  bucket: kyonelife
  image-max-size: 5242880
  video-max-size: 104857600
  allowed-image-extensions:
    - jpg
    - jpeg
    - png
    - webp
    - gif
  allowed-image-content-types:
    - image/jpeg
    - image/png
    - image/webp
    - image/gif
  allowed-video-extensions:
    - mp4
    - webm
    - mov
  allowed-video-content-types:
    - video/mp4
    - video/webm
    - video/quicktime

logging:
  file:
    name: logs/kyonelife-blog.log
  level:
    root: info
    com.yky.blog: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{50} - %msg%n"
