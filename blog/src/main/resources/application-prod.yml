# 生产配置：连接信息与密钥全部来自环境变量。
# 没有默认值的项（密码/密钥）未注入时会在启动时报错 —— 故意 fail-fast，避免裸跑。
# 主机默认值是 docker-compose 的服务名（mysql/redis/minio），compose 里只需注入密钥。
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:kyonelife}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  # 浏览器访问图片用的公网地址（如 https://cdn.example.com），必须显式提供
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    com.yky.blog: info
