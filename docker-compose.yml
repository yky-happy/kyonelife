# =========================================================
# kyonelife 一键部署编排（含域名 + HTTPS 网关）
#
#   1. cp .env.example .env   并按需改域名 / 密钥
#   2. 把 HTTPS 证书放到 deploy/nginx/certs/（见该目录说明与 README-部署.md）
#   3. docker compose up -d --build
#   4. 浏览器打开 https://你的域名  即可访问读者端
#                 https://admin.你的域名  访问管理后台
#
# 对公网开放的只有 gateway(80/443)；后端 blog、mysql、redis、minio 均在内网。
# 数据库/后端的调试端口只绑定到 127.0.0.1（仅服务器本机可连，公网访问不到）。
# =========================================================

services:
  mysql:
    image: mysql:8.0
    container_name: kyonelife-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB:-kyonelife}
      TZ: Asia/Shanghai
    # 不映射主机端口：后端在 Docker 内网用容器名 mysql:3306 直连，
    # 也避免与服务器上已有的 mysql/redis 抢占 3306/6379。
    volumes:
      - ./docker-data/mysql:/var/lib/mysql
      # 首次启动自动执行：建库 + 全部表 + 种子数据（含管理员 yky / admin123）
      - ./blog/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kyonelife-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    # 不映射主机端口：后端在内网用 redis:6379 直连
    volumes:
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: kyonelife-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    # 不映射主机端口：后端用 minio:9000 直连，图片对外经网关 /minio 反代
    volumes:
      - ./docker-data/minio:/data
    restart: unless-stopped

  blog:
    build:
      context: ./blog
    image: kyonelife/blog:latest
    container_name: kyonelife-blog
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 显式钉死容器内网地址，避免 .env 里被改成宿主机地址后连不上
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      MINIO_ENDPOINT: http://minio:9000
    ports:
      # 仅本机调试用；公网通过 gateway 的 /api、/admin 反代访问
      - "127.0.0.1:${SERVER_PORT:-8080}:8080"
    volumes:
      - ./docker-data/blog-logs:/app/logs
    restart: unless-stopped

  # ---- 前端构建：打包 dist 到命名卷后退出（非常驻）----
  web-build:
    build:
      context: ./blog-web
    image: kyonelife/web-build:latest
    container_name: kyonelife-web-build
    volumes:
      - web_dist:/out
    restart: "no"

  admin-build:
    build:
      context: ./blog-admin
    image: kyonelife/admin-build:latest
    container_name: kyonelife-admin-build
    volumes:
      - admin_dist:/out
    restart: "no"

  # ---- 网关：唯一对公网开放，托管前端静态 + 反代后端 + TLS 终止 ----
  gateway:
    image: nginx:1.27-alpine
    container_name: kyonelife-gateway
    depends_on:
      web-build:
        condition: service_completed_successfully
      admin-build:
        condition: service_completed_successfully
      blog:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - ./docker-data/certbot:/var/www/certbot
      - web_dist:/usr/share/nginx/web:ro
      - admin_dist:/usr/share/nginx/admin:ro
    restart: unless-stopped

volumes:
  web_dist:
  admin_dist:
